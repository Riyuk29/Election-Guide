<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="description" content="Navi — Interactive Indian Election Guide Agent. Nonpartisan, multilingual, voice-enabled assistant for Indian voters. Built with Google Services integration.">
<meta name="theme-color" content="#050810">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https:; connect-src https:; img-src https: data:; media-src https:; frame-src https:;">
<meta name="robots" content="index, follow">
<meta name="author" content="Navi Team">
<title>Navi — Indian Election Guide Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400&family=Noto+Sans+Devanagari:wght@400;600;700&family=Noto+Sans+Tamil:wght@400;600&family=Noto+Sans+Kannada:wght@400;600&family=Noto+Sans+Telugu:wght@400;600&family=Noto+Sans+Bengali:wght@400;600&family=Noto+Sans+Gujarati:wght@400;600&family=Noto+Sans+Malayalam:wght@400;600&family=Noto+Sans+Gurmukhi:wght@400;600&family=Noto+Sans+Oriya:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ================================================================
   NAVI — Indian Election Guide Agent v3.0
   Aesthetic: Dark cinematic, saffron-gold accents
   Architecture: Single-file, zero dependencies, production-grade
   ================================================================ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050810;--bg2:#0a0e1a;--surface:#111827;--card:#161d2e;--card-h:#1e2740;
  --saffron:#ff9933;--saffron-l:#ffb366;--saffron-dim:rgba(255,153,51,.1);
  --gold:#d4a84b;--gold-l:#f0d878;--gold-dim:rgba(212,168,75,.08);
  --green:#138808;--green-l:#25c41b;--green-dim:rgba(19,136,8,.1);
  --blue:#5b8def;--blue-dim:rgba(91,141,239,.1);
  --text:#eef0f5;--text2:#8891a5;--text3:#3e4558;
  --border:rgba(255,255,255,.05);--border-s:rgba(255,153,51,.15);
  --fd:'Syne',sans-serif;--fb:'Source Serif 4',serif;--fm:'DM Mono',monospace;
  --ease:cubic-bezier(.4,0,.2,1);--r:14px;--r-sm:10px;
  --chat-max:620px;--card-max:620px
}
html{scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--saffron-dim) var(--bg)}
html,body{height:100%;overflow:hidden}
body{font-family:var(--fb);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(40,20,5,.3) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(10,30,15,.2) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(10,15,30,.15) 0%,transparent 60%);pointer-events:none;z-index:0}
.skip-link{position:absolute;top:-100px;left:16px;z-index:9999;padding:12px 20px;background:var(--saffron);color:var(--bg);font-family:var(--fm);font-size:.8rem;border-radius:var(--r-sm);text-decoration:none;transition:top .3s;focus:top:16px}
.skip-link:focus{top:16px}
#particles{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ===== LANGUAGE SELECTOR ===== */
#langSel{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;transition:all .9s var(--ease);overflow-y:auto;-webkit-overflow-scrolling:touch}
#langSel.exit{opacity:0;transform:scale(1.1);pointer-events:none}
.ls-orb{position:relative;width:120px;height:120px;margin-bottom:28px;opacity:0;animation:fadeUp .7s .2s var(--ease) forwards}
.ls-orb-c{position:absolute;inset:24px;border-radius:50%;background:radial-gradient(circle at 35% 35%,var(--saffron-l),var(--saffron) 50%,#b35900);box-shadow:0 0 40px rgba(255,153,51,.35),0 0 80px rgba(255,153,51,.1);animation:breathe 4s ease-in-out infinite}
.ls-orb-r{position:absolute;border-radius:50%;border:1.5px solid transparent}
.ls-orb-r1{inset:4px;border-top-color:rgba(255,153,51,.35);animation:spin 10s linear infinite}
.ls-orb-r2{inset:14px;border-bottom-color:rgba(212,168,75,.25);animation:spin 14s linear infinite reverse}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes spin{to{transform:rotate(360deg)}}
.ls-title{font-family:var(--fd);font-size:clamp(2rem,5vw,3rem);font-weight:800;margin-bottom:6px;opacity:0;animation:fadeUp .7s .35s var(--ease) forwards}
.ls-sub{color:var(--text2);font-size:.95rem;margin-bottom:32px;font-weight:300;opacity:0;animation:fadeUp .7s .5s var(--ease) forwards;text-align:center;max-width:400px}
.ls-label{font-family:var(--fm);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--saffron);margin-bottom:16px;opacity:0;animation:fadeUp .7s .6s var(--ease) forwards}
.ls-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;max-width:740px;width:100%;opacity:0;animation:fadeUp .7s .7s var(--ease) forwards}
.ls-card{padding:14px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;text-align:center;transition:all .3s var(--ease);position:relative;overflow:hidden}
.ls-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,153,51,.05),transparent);opacity:0;transition:opacity .3s}
.ls-card:hover,.ls-card:focus-visible{border-color:var(--border-s);transform:translateY(-3px);box-shadow:0 6px 24px rgba(255,153,51,.08);outline:2px solid var(--saffron);outline-offset:2px}
.ls-card:hover::before,.ls-card:focus-visible::before{opacity:1}
.ls-card .native{font-size:1.05rem;font-weight:600;line-height:1.4;display:block;margin-bottom:2px}
.ls-card .latin{font-family:var(--fm);font-size:.6rem;color:var(--text3);letter-spacing:.05em;text-transform:uppercase}
.ls-disclaimer{position:fixed;bottom:20px;font-family:var(--fm);font-size:.55rem;color:var(--text3);letter-spacing:.06em;text-align:center;padding:0 16px;opacity:0;animation:fadeUp .7s 1s var(--ease) forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ===== CHAT SCREEN ===== */
#chatScreen{position:fixed;inset:0;z-index:50;display:grid;grid-template-rows:auto auto 1fr auto auto;opacity:0;transform:scale(.95);pointer-events:none;transition:all .8s var(--ease)}
#chatScreen.active{opacity:1;transform:scale(1);pointer-events:all}

/* HEADER */
.hdr{display:flex;align-items:center;gap:12px;padding:12px 20px;background:rgba(5,8,16,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);z-index:10}
.h-orb{position:relative;width:38px;height:38px;flex-shrink:0}
.h-orb-c{position:absolute;inset:5px;border-radius:50%;background:radial-gradient(circle at 35% 35%,var(--saffron-l),var(--saffron) 55%,#b35900);box-shadow:0 0 14px rgba(255,153,51,.35);animation:breathe 3.5s ease-in-out infinite}
.h-orb-r1{position:absolute;inset:0;border-radius:50%;border-top:1.5px solid rgba(255,153,51,.3);border-right:1.5px solid rgba(255,153,51,.05);animation:spin 8s linear infinite}
.h-orb-r2{position:absolute;inset:3px;border-radius:50%;border-bottom:1.5px solid rgba(212,168,75,.2);border-left:1.5px solid rgba(212,168,75,.03);animation:spin 12s linear infinite reverse}
.h-orb.thinking .h-orb-c{animation-duration:1s;box-shadow:0 0 22px rgba(255,153,51,.6)}
.h-info{flex:1;min-width:0}
.h-name{font-family:var(--fd);font-size:.95rem;font-weight:700}
.h-status{font-family:var(--fm);font-size:.6rem;color:var(--text3);letter-spacing:.04em;transition:color .3s}
.h-status.on{color:var(--saffron)}
.h-ctrls{display:flex;align-items:center;gap:6px}
.h-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s var(--ease);font-size:.8rem;position:relative}
.h-btn:hover,.h-btn:focus-visible{border-color:var(--border-s);color:var(--saffron);background:var(--saffron-dim);outline:none}
.h-btn:focus-visible{outline:2px solid var(--saffron);outline-offset:2px}
.h-btn.active{border-color:var(--saffron);color:var(--saffron);background:var(--saffron-dim)}
.h-btn.lang-btn{font-size:.65rem;font-family:var(--fm);font-weight:600;width:auto;padding:0 10px;border-radius:16px;letter-spacing:.03em}
.h-ring{position:relative;width:36px;height:36px;flex-shrink:0}
.h-ring svg{width:100%;height:100%}
.h-ring-bg{fill:none;stroke:rgba(255,255,255,.04);stroke-width:3}
.h-ring-f{fill:none;stroke:var(--saffron);stroke-width:3;stroke-linecap:round;stroke-dasharray:94;stroke-dashoffset:94;transition:stroke-dashoffset .8s var(--ease)}
.h-ring-t{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:.5rem;font-weight:700;color:var(--saffron)}

/* JOURNEY BAR */
.j-bar{display:flex;align-items:center;justify-content:center;gap:3px;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.j-dot{width:7px;height:7px;border-radius:50%;background:var(--card);border:1.5px solid rgba(255,255,255,.06);transition:all .5s var(--ease);position:relative}
.j-dot.active{background:var(--saffron);border-color:var(--saffron);box-shadow:0 0 8px rgba(255,153,51,.3)}
.j-dot.done{background:var(--green-l);border-color:var(--green)}
.j-dot::after{content:attr(data-l);position:absolute;top:12px;left:50%;transform:translateX(-50%);font-family:var(--fm);font-size:.45rem;color:var(--text3);white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none}
.j-dot.active::after,.j-dot:hover::after{opacity:1}
.j-line{width:16px;height:2px;background:rgba(255,255,255,.03);transition:background .5s var(--ease);border-radius:1px}
.j-line.done{background:var(--green)}

/* CHAT */
.chat{overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:0;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.chat::-webkit-scrollbar{width:3px}.chat::-webkit-scrollbar-track{background:transparent}.chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,.05);border-radius:3px}
.msg{display:flex;gap:10px;margin-bottom:4px;max-width:var(--chat-max);width:100%;opacity:0;transform:translateY(10px);animation:msgIn .3s var(--ease) forwards;will-change:transform,opacity}
.msg.agent{align-self:flex-start}.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-av{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;margin-top:2px}
.msg.agent .msg-av{background:var(--saffron-dim);border:1px solid var(--border-s)}
.msg.user .msg-av{background:var(--blue-dim);border:1px solid rgba(91,141,239,.2)}
.bub{padding:12px 16px;font-size:.9rem;line-height:1.65;border-radius:16px;word-break:break-word}
.msg.agent .bub{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg.agent .bub strong{color:var(--gold-l);font-weight:600}
.msg.agent .bub em{color:var(--text2);font-style:italic;font-size:.82rem}
.msg.user .bub{background:linear-gradient(135deg,var(--blue),#3d6ad4);color:#fff;border-bottom-right-radius:4px}
@keyframes msgIn{to{opacity:1;transform:translateY(0)}}
.typ{display:flex;gap:10px;margin-bottom:4px;align-self:flex-start;opacity:0;animation:msgIn .15s var(--ease) forwards}
.typ .msg-av{width:26px;height:26px;border-radius:50%;background:var(--saffron-dim);border:1px solid var(--border-s);display:flex;align-items:center;justify-content:center;font-size:.65rem;flex-shrink:0}
.typ-dots{display:flex;gap:4px;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px}
.typ-dot{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:tB 1.4s ease-in-out infinite}
.typ-dot:nth-child(2){animation-delay:.2s}.typ-dot:nth-child(3){animation-delay:.4s}
@keyframes tB{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-4px);opacity:1}}

/* VOICE WAVE */
.voice-wave{display:none;align-items:center;justify-content:center;gap:3px;padding:8px 0}
.voice-wave.active{display:flex}
.vw-bar{width:3px;background:var(--saffron);border-radius:2px;animation:vwPulse 1s ease-in-out infinite}
.vw-bar:nth-child(1){height:12px;animation-delay:0s}
.vw-bar:nth-child(2){height:18px;animation-delay:.15s}
.vw-bar:nth-child(3){height:24px;animation-delay:.3s}
.vw-bar:nth-child(4){height:18px;animation-delay:.45s}
.vw-bar:nth-child(5){height:12px;animation-delay:.6s}
@keyframes vwPulse{0%,100%{transform:scaleY(.4);opacity:.4}50%{transform:scaleY(1);opacity:1}}

/* CARDS */
.rc{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border:1px solid var(--border-s);border-radius:var(--r);margin:6px 0;cursor:pointer;transition:all .25s var(--ease);text-decoration:none;color:inherit;max-width:var(--card-max);width:100%;opacity:0;transform:translateY(10px);animation:msgIn .3s var(--ease) forwards}
.rc:hover,.rc:focus-visible{background:var(--card-h);border-color:var(--saffron);transform:translateY(-2px);box-shadow:0 4px 20px rgba(255,153,51,.06);outline:none}
.rc:focus-visible{outline:2px solid var(--saffron);outline-offset:2px}
.rc-ico{width:40px;height:40px;border-radius:10px;background:var(--saffron-dim);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.rc-body{flex:1;min-width:0}
.rc-body h4{font-family:var(--fd);font-size:.85rem;font-weight:600;margin-bottom:1px}
.rc-body p{font-size:.72rem;color:var(--text3);line-height:1.3}
.rc-tag{display:block;font-family:var(--fm);font-size:.5rem;letter-spacing:.07em;text-transform:uppercase;color:var(--saffron);margin-top:5px;opacity:.6}
.rc-arr{color:var(--saffron);font-size:.7rem;opacity:0;transition:all .25s var(--ease);flex-shrink:0}
.rc:hover .rc-arr{opacity:1;transform:translateX(3px)}
.rc-links{padding:12px 16px;background:var(--surface);border:1px solid var(--border-s);border-radius:var(--r);margin:6px 0;max-width:var(--card-max);width:100%;opacity:0;transform:translateY(10px);animation:msgIn .3s var(--ease) forwards;display:flex;flex-direction:column;gap:6px}
.rc-links-head{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.rc-links-head h4{font-family:var(--fd);font-size:.85rem;font-weight:600}
.rc-link{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--saffron);font-size:.82rem;text-decoration:none;transition:all .25s var(--ease)}
.rc-link:hover,.rc-link:focus-visible{border-color:var(--border-s);background:var(--card-h);outline:none}
.rc-link:focus-visible{outline:2px solid var(--saffron);outline-offset:2px}
.rc-link span{margin-left:auto;opacity:.35;font-size:.6rem}

/* EMBEDS */
.yt-embed{position:relative;width:100%;max-width:var(--card-max);padding-bottom:56.25%;height:0;overflow:hidden;border-radius:var(--r);margin:8px 0;border:1px solid var(--border-s);opacity:0;transform:translateY(10px);animation:msgIn .3s var(--ease) forwards}
.yt-embed iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
.maps-embed{position:relative;width:100%;max-width:var(--card-max);height:250px;border-radius:var(--r);margin:8px 0;border:1px solid var(--border-s);overflow:hidden;opacity:0;transform:translateY(10px);animation:msgIn .3s var(--ease) forwards}
.maps-embed iframe{width:100%;height:100%;border:0}

/* CHOICES */
.choices{padding:10px 16px 8px;display:flex;flex-direction:column;gap:6px;max-width:640px;margin:0 auto;width:100%}
.ch{width:100%;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:var(--fb);font-size:.9rem;cursor:pointer;text-align:left;transition:all .25s var(--ease);opacity:0;transform:translateY(8px);animation:cIn .3s var(--ease) forwards;position:relative;overflow:hidden}
.ch::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--saffron);transform:scaleY(0);transition:transform .25s var(--ease);border-radius:0 2px 2px 0}
.ch:hover,.ch:focus-visible{background:var(--card-h);border-color:var(--border-s);transform:translateX(3px);outline:none}
.ch:focus-visible{outline:2px solid var(--saffron);outline-offset:2px}
.ch:hover::before,.ch:focus-visible::before{transform:scaleY(1)}
.ch.sel{background:var(--saffron-dim);border-color:var(--saffron);color:var(--saffron-l)}
.ch.sel::before{transform:scaleY(1)}
.ch:disabled{opacity:.35;cursor:not-allowed;transform:none!important}
@keyframes cIn{to{opacity:1;transform:translateY(0)}}

/* INPUT */
.input-area{display:flex;align-items:center;gap:8px;padding:12px 16px;background:rgba(5,8,16,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border)}
.inp{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-family:var(--fb);font-size:.9rem;outline:none;transition:border-color .25s var(--ease)}
.inp:focus{border-color:var(--border-s);box-shadow:0 0 0 2px rgba(255,153,51,.1)}
.inp::placeholder{color:var(--text3)}
.send-btn,.voice-btn{width:42px;height:42px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s var(--ease);flex-shrink:0;font-size:.9rem}
.send-btn{background:var(--saffron);color:var(--bg)}
.send-btn:hover,.send-btn:focus-visible{background:var(--saffron-l);transform:scale(1.05)}
.voice-btn{background:var(--surface);border:1px solid var(--border);color:var(--text3)}
.voice-btn:hover,.voice-btn:focus-visible{border-color:var(--border-s);color:var(--saffron)}
.voice-btn.recording{background:rgba(255,50,50,.15);border-color:rgba(255,50,50,.4);color:#ff5050;animation:recPulse 1.5s ease-in-out infinite}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,50,50,.2)}50%{box-shadow:0 0 0 8px rgba(255,50,50,0)}}
.qa{display:flex;gap:6px;padding:6px 16px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.qa::-webkit-scrollbar{display:none}
.qa-btn{flex-shrink:0;padding:6px 14px;background:var(--surface);border:1px solid var(--border);border-radius:100px;color:var(--text2);font-family:var(--fm);font-size:.7rem;cursor:pointer;transition:all .25s var(--ease);white-space:nowrap}
.qa-btn:hover,.qa-btn:focus-visible{border-color:var(--border-s);color:var(--saffron);background:var(--saffron-dim)}

/* CELEBRATION */
#cele{position:fixed;inset:0;z-index:200;pointer-events:none;display:none}
#cele.on{display:block}
.conf{position:absolute;top:-10px;animation:cFall linear forwards;will-change:transform}
@keyframes cFall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
.cele-m{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--card);border:2px solid var(--saffron);border-radius:20px;padding:40px;text-align:center;z-index:201;max-width:380px;width:90%;animation:celeP .5s .4s cubic-bezier(.17,.67,.35,1.2) forwards}
@keyframes celeP{to{transform:translate(-50%,-50%) scale(1)}}
.cele-m h2{font-family:var(--fd);font-size:1.5rem;font-weight:800;margin-bottom:6px}
.cele-m p{color:var(--text2);font-size:.88rem;margin-bottom:20px;line-height:1.6}
.cele-m button{font-family:var(--fm);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;background:var(--saffron);color:var(--bg);border:none;padding:11px 24px;border-radius:100px;cursor:pointer;transition:all .25s var(--ease)}
.cele-m button:hover,.cele-m button:focus-visible{background:var(--saffron-l);transform:translateY(-1px)}

/* API MODAL */
.api-modal{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(8px)}
.api-modal-inner{background:var(--card);border:1px solid var(--border-s);border-radius:20px;padding:36px;max-width:420px;width:90%}
.api-modal-inner h3{font-family:var(--fd);font-size:1.2rem;margin-bottom:8px}
.api-modal-inner p{color:var(--text2);font-size:.85rem;line-height:1.6;margin-bottom:16px}
.api-modal-inner input{width:100%;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--fm);font-size:.8rem;margin-bottom:16px;outline:none}
.api-modal-inner input:focus{border-color:var(--border-s);box-shadow:0 0 0 2px rgba(255,153,51,.1)}
.api-modal-btns{display:flex;gap:10px;justify-content:flex-end}

/** @type {HTMLCanvasElement} */

/** Particle field animation — decorative background */
(function initParticles() {
  try {
    const ctx = canvas.getContext('2d');
    if (!ctx) return;
    
    let W, H;
    const particles = [];
    const PARTICLE_COUNT = 45;
    
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    
    resize();
    window.addEventListener('resize', resize, { passive: true });
    
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push({
        x: Math.random() * 2000,
        y: Math.random() * 2000,
        vx: (Math.random() - 0.5) * 0.2,
        vy: -Math.random() * 0.35 - 0.06,
        size: Math.random() * 1.6 + 0.3,
        opacity: Math.random() * 0.2 + 0.04,
        life: Math.random()
      });
    }
    
    function draw() {
      ctx.clearRect(0, 0, W, H);
      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.0006;
        if (p.y < 0 || p.life <= 0) {
          p.y = H + 10;
          p.x = Math.random() * W;
          p.life = 1;
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,153,51,${p.opacity * p.life})`;
        ctx.fill();
      }
      requestAnimationFrame(draw);
    }
    
    draw();
  } catch (e) {
    console.warn('Particles init failed:', e.message);
  }
})();

/* ============================================================
   SECTION 4: GOOGLE GEMINI AI CONFIGURATION
   ============================================================ */

/**
 * Google Gemini AI integration for intelligent query resolution
 * Uses Gemini 2.0 Flash for fast, accurate election-related responses
 * @see https://ai.google.dev/docs
 */
const GEMINI = Object.freeze({
  /** @type {string} Gemini API endpoint */
  endpoint: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent',
  
  /** @returns {string} API key from session storage */
  get key() { try { return sessionStorage.getItem('navi_gk') || ''; } catch { return ''; } },
  /** @param {string} v - API key to store */
  set key(v) { try { sessionStorage.setItem('navi_gk', v); } catch {} },
  
  /** @returns {boolean} Whether API key is available */
  get ready() { return this.key.length > 10; },
  
  /** @type {string} System prompt constraining Gemini to election topics */
  systemPrompt: 'You are Navi, an Indian Election Guide. ONLY answer about Indian elections, ECI, Voter ID, EVM, VVPAT, NOTA, polling booths, voter registration, electoral rolls, and democratic processes in India. Keep responses under 120 words. Be factual and nonpartisan. Always recommend verifying with ECI (eci.gov.in). Mention relevant ECI forms when applicable. Reference Voter Helpline 1950 for urgent issues. If asked about non-election topics, redirect politely.',
  
  /** @type {number} Temperature for balanced responses */
  temperature: 0.4,
  
  /** @type {number} Maximum output tokens */
  maxTokens: 250
});

/**
 * Show API key input modal
 * @returns {Promise<boolean>} Whether key was successfully provided
 */
function showApiKeyModal() {
  return new Promise(resolve => {
    if (GEMINI.ready) { resolve(true); return; }
    
    const modal = document.createElement('div');
    modal.className = 'api-modal';
    modal.setAttribute('role', 'dialog');
    modal.setAttribute('aria-label', 'Enable AI Mode');
    modal.innerHTML = `
      <div class="api-modal-inner">
        <h3>Enable AI Mode</h3>
        <p>Enter your <strong>Google Gemini API key</strong> for intelligent answers to any election question.</p>
        <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener noreferrer">Get free API key →</a>
        <input type="password" id="apiKeyInp" placeholder="Paste your API key here..." autocomplete="off" aria-label="Gemini API key">
        <div class="api-modal-btns">
          <button type="button" class="skip" id="apiSkip">Skip</button>
          <button type="button" class="save" id="apiSave">Enable AI</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    
    const inp = modal.querySelector('#apiKeyInp');
    const saveBtn = modal.querySelector('#apiSave');
    const skipBtn = modal.querySelector('#apiSkip');
    
    inp.focus();
    
    const cleanup = (result) => { modal.remove(); resolve(result); };
    
    skipBtn.addEventListener('click', () => cleanup(false));
    saveBtn.addEventListener('click', () => {
      const v = inp.value.trim();
      if (v.length > 10) { GEMINI.key = v; cleanup(true); }
      else { inp.style.borderColor = '#ff4444'; inp.setAttribute('aria-invalid', 'true'); }
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') saveBtn.click();
      if (e.key === 'Escape') cleanup(false);
    });
  });
}

/**
 * Query Google Gemini AI for election-related questions
 * @param {string} query - User's question
 * @param {string} lang - Current language code
 * @returns {Promise<string|null>} AI response text or null on failure
 */
async function queryGemini(query, lang) {
  if (!GEMINI.ready) return null;
  
  try {
    const langName = LANGS.find(l => l.code === lang)?.latin || 'English';
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 8000);
    
    const response = await fetch(`${GEMINI.endpoint}?key=${GEMINI.key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: controller.signal,
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: GEMINI.systemPrompt + `\nRespond in ${langName}.` }] },
        contents: [{ parts: [{ text: query }] }],
        generationConfig: { maxOutputTokens: GEMINI.maxTokens, temperature: GEMINI.temperature }
      })
    });
    
    clearTimeout(timeout);
    if (!response.ok) return null;
    
    const data = await response.json();
    return data?.candidates?.[0]?.content?.parts?.[0]?.text || null;
  } catch (e) {
    if (e.name !== 'AbortError') console.warn('Gemini error:', e.message);
    return null;
  }
}

nota:{step:4,msgs:{en:["**NOTA — None of the Above**\n\nIf no candidate appeals, press NOTA on EVM (last button).\n\n⚠️ Currently no legal weight — winner still wins. But it sends a message.\n\nPressing NOTA is always better than not voting."],hi:["**NOTA — इनमें से कोई नहीं**\n\nकोई पसंद नहीं तो EVM पर NOTA (आखिरी बटन)।\n\n⚠️ कानूनी प्रभाव नहीं। लेकिन संदेश देता है।\n\nNOTA दबाना न वोट करने से बेहतर।"]},choices:{en:[{t:"🗳️ EVM & VVPAT?",n:"evm"},{t:"✅ Prepare for Election Day!",n:"prepare"}],hi:[{t:"🗳️ EVM और VVPAT?",n:"evm"},{t:"✅ चुनाव दिवस तैयारी!",n:"prepare"}]}},

/**
 * Promise-based delay
 * @param {number} ms - Milliseconds to wait
 * @returns {Promise<void>}
 */
const sleep = ms => new Promise(r => setTimeout(r, ms));

/** Scroll chat container to bottom */
const scrollChat = () => { DOM.chat.scrollTop = DOM.chat.scrollHeight; };

/**
 * Update header status text
 * @param {string} text - Status text
 * @param {boolean} isActive - Whether to highlight
 */
function setStatus(text, isActive) {
  DOM.hSt.textContent = text;
  DOM.hSt.classList.toggle('on', isActive);
}

/**
 * Update journey progress ring and dots
 * @param {number} step - Current step index (0-7)
 */
function updateProgress(step) {
  if (step === undefined) return;
  state.curProg = Math.max(state.curProg, step);
  const pct = Math.round((state.curProg / TOTAL) * 100);
  DOM.hRT.textContent = pct + '%';
  DOM.hRF.style.strokeDashoffset = 94 - (94 * pct / 100);
  DOM.jBar.setAttribute('aria-valuenow', state.curProg);
  
  document.querySelectorAll('.j-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === state.curProg);
    dot.classList.toggle('done', i < state.curProg);
  });
  document.querySelectorAll('.j-line').forEach((line, i) => {
    line.classList.toggle('done', i < state.curProg);
  });
}

/** Show typing indicator animation */
async function showTyping() {
  DOM.hOrb.classList.add('thinking');
  setStatus(t('think'), true);
  
  const el = document.createElement('div');
  el.className = 'typ';
  el.setAttribute('aria-label', 'Navi is thinking');
  el.innerHTML = '<div class="msg-av" aria-hidden="true">✦</div><div class="typ-dots"><div class="typ-dot"></div><div class="typ-dot"></div><div class="typ-dot"></div></div>';
  DOM.chat.appendChild(el);
  scrollChat();
  await sleep(450 + Math.random() * 350);
  el.remove();
}

/**
 * Render text character-by-character with markdown support
 * @param {HTMLElement} container - Target element
 * @param {string} text - Raw text with markdown
 * @param {number} [speed=14] - Typing speed in ms per character
 */
async function typeText(container, text, speed = 14) {
  const html = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\_(.*?)\_/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
  
  let buffer = '';
  let i = 0;
  
  DOM.hOrb.classList.add('thinking');
  setStatus(t('speak'), true);
  
  while (i < html.length) {
    if (html[i] === '<') {
      const close = html.indexOf('>', i);
      buffer += html.substring(i, close + 1);
      i = close + 1;
    } else {
      buffer += html[i];
      i++;
      container.innerHTML = buffer;
      scrollChat();
      await sleep(speed + Math.random() * 6);
    }
  }
  
  container.innerHTML = html;
  DOM.hOrb.classList.remove('thinking');
  setStatus(t('ready'), false);
  
  if (state.voiceOn) speakText(text);
}

/**
 * Add agent message with typing animation
 * @param {string} text - Message text with markdown
 */
async function addMsg(text) {
  await showTyping();
  const wrapper = document.createElement('div');
  wrapper.className = 'msg agent';
  wrapper.setAttribute('role', 'article');
  wrapper.innerHTML = '<div class="msg-av" aria-hidden="true">✦</div><div class="bub"></div>';
  DOM.chat.appendChild(wrapper);
  scrollChat();
  await typeText(wrapper.querySelector('.bub'), text);
  await sleep(100);
}

/**
 * Add response choice buttons
 * @param {Array<{t:string, n:string}>} choices - Choice objects
 */
function addChoices(choices) {
  DOM.choices.innerHTML = '';
  const frag = document.createDocumentFragment();
  
  choices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'ch';
    btn.textContent = choice.t;
    btn.style.animationDelay = (i * 0.06) + 's';
    btn.setAttribute('aria-label', choice.t);
    
    btn.addEventListener('click', async () => {
      DOM.choices.querySelectorAll('button').forEach(b => b.disabled = true);
      btn.classList.add('sel');
      
      const userMsg = document.createElement('div');
      userMsg.className = 'msg user';
      userMsg.setAttribute('role', 'article');
      userMsg.innerHTML = '<div class="msg-av" aria-hidden="true">You</div><div class="bub"></div>';
      userMsg.querySelector('.bub').textContent = choice.t;
      DOM.chat.appendChild(userMsg);
      scrollChat();
      
      await sleep(300);
      DOM.choices.innerHTML = '';
      await sleep(150);
      showNode(choice.n);
    });
    
    frag.appendChild(btn);
  });
  
  DOM.choices.appendChild(frag);
  if (choices.length > 0) setTimeout(() => DOM.choices.querySelector('.ch')?.focus(), 100);
}

  const wrapper = document.createElement('div');

  wrapper.setAttribute('aria-label', 'Quick action buttons');
  
  qaItems.forEach(label => {
    const btn = document.createElement('button');
    btn.className = 'qa-btn';
    btn.textContent = label;
    btn.setAttribute('aria-label', label);
    btn.addEventListener('click', () => handleQuery(label));
    wrapper.appendChild(btn);
  });
  
  DOM.choices.parentElement.insertBefore(wrapper, DOM.choices);
}

/**
 * Navigate to a conversation node and render all content
 * @param {string} id - Node identifier key
 */
async function showNode(id) {
  const node = C[id];
  if (!node) { console.warn('Node not found:', id); return; }
  
  updateProgress(node.step);
  
  for (const msg of getMsg(node)) {
    await addMsg(msg);
  }
  
  if (node.ytEmbed) addYouTubeEmbed(node.ytEmbed);
  if (node.mapsEmbed) addMapsEmbed();
  if (node.card) addGoogleServiceCard(node.card);
  if (node.celebrate) celebrate();
  
  addChoices(getCh(node));
  addQuickActions();
}

   ============================================================ */

/**
 * Process user query through three resolution tiers:
 * 1. Local keyword matching (instant, no API)
 * 2. Google Gemini AI (intelligent, requires API key)
 * 3. Static fallback (always available)
 * 
 * @param {string} raw - Raw user input text
 */
async function handleQuery(raw) {
  const query = raw.toLowerCase().trim();
  
  // Input sanitization — prevent XSS
  const sanitized = query.replace(/[<>]/g, '');
  if (sanitized.length === 0) return;
  
  // TIER 1: Local keyword matching (instant)
  const langMap = QMAP[curLang] || {};
  const enMap = QMAP.en || {};
  
  for (const [keyword, nodeId] of Object.entries(langMap)) {
    if (sanitized.includes(keyword)) { navigateToNode(nodeId, raw); return; }
  }
  for (const [keyword, nodeId] of Object.entries(enMap)) {
    if (sanitized.includes(keyword)) { navigateToNode(nodeId, raw); return; }
  }
  
  // TIER 2: Google Gemini AI (if available)
  const aiResponse = await queryGemini(raw, curLang);
  if (aiResponse) { addAIResponse(raw, aiResponse); return; }
  
  // TIER 3: Static fallback
  addFallbackResponse(raw);
}

/**
 * Navigate to a conversation node from user query
 * @param {string} nodeId - Target node key
 * @param {string} raw - Original user input for display
 */
function navigateToNode(nodeId, raw) {
  addUserMessage(raw);
  DOM.choices.innerHTML = '';
  setTimeout(() => showNode(nodeId), 300);
}

/**
 * Add user message bubble to chat
 * @param {string} text - User's message text
 */
function addUserMessage(text) {
  const wrapper = document.createElement('div');
  wrapper.className = 'msg user';
  wrapper.setAttribute('role', 'article');
  wrapper.innerHTML = '<div class="msg-av" aria-hidden="true">You</div><div class="bub"></div>';
  wrapper.querySelector('.bub').textContent = text;
  DOM.chat.appendChild(wrapper);
  scrollChat();
}

/**
 * Display Gemini AI response with verification disclaimer
 * @param {string} raw - Original user query
 * @param {string} response - AI-generated response
 */
async function addAIResponse(raw, response) {
  addUserMessage(raw);
  DOM.choices.innerHTML = '';
  await addMsg(response + '\n\n_AI-generated — verify with ECI at eci.gov.in_');
  addChoices(getCh(C.welcome));
  addQuickActions();
}

/**
 * Show static fallback response when no match found
 * @param {string} raw - Original user query
 */
async function addFallbackResponse(raw) {
  addUserMessage(raw);
  DOM.choices.innerHTML = '';
  
  const fallbacks = {
    en: "Try asking about: registration, voter ID, electoral roll, polling booth, documents, EVM, NOTA, NRI voting, Aadhaar, or election dates.\n\n💡 Enable AI mode (✦ button) for intelligent answers.",
    hi: "पंजीकरण, वोटर ID, मतदाता सूची, बूथ, दस्तावेज, EVM, NOTA, NRI, आधार, चुनाव तारीख के बारे में पूछें।\n\n💡 AI मोड (✦ बटन) सक्षम करें।"
  };
  
  await addMsg(fallbacks[curLang] || fallbacks.en);
  addChoices(getCh(C.welcome));
  addQuickActions();
}

/* ============================================================
   SECTION 13: VOICE SYSTEM (Web Speech API)
   ============================================================ */

/**
 * Speak text using SpeechSynthesis API
 * @param {string} text - Text to speak aloud
 */
function speakText(text) {
  if (!state.synth) return;
  state.synth.cancel();
  
  const clean = text.replace(/\*\*/g, '').replace(/\_/g, '').replace(/\n/g, '. ');
  const utterance = new SpeechSynthesisUtterance(clean);
  utterance.lang = LANGS.find(l => l.code === curLang)?.voice || 'en-IN';
  utterance.rate = 0.92;
  utterance.pitch = 1;
  
  try {
    const voices = state.synth.getVoices();
    const match = voices.find(v => v.lang.startsWith(curLang));
    if (match) utterance.voice = match;
  } catch (e) { /* Use default voice */ }
  
  state.synth.speak(utterance);
}

/** Initialize Speech Recognition with error handling */
function initSpeechRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    DOM.voiceBtn.style.display = 'none';
    return;
  }
  
  state.recognition = new SpeechRecognition();
  state.recognition.continuous = false;
  state.recognition.interimResults = true;
  state.recognition.lang = LANGS.find(l => l.code === curLang)?.voice || 'en-IN';
  
  state.recognition.onresult = (event) => {
    const transcript = Array.from(event.results).map(r => r[0].transcript).join('');
    DOM.userInp.value = transcript;
    if (event.results[0].isFinal) { stopRecording(); handleQuery(transcript); }
  };
  
  state.recognition.onerror = (e) => { console.warn('Speech error:', e.error); stopRecording(); };
  state.recognition.onend = () => { if (state.isRecording) stopRecording(); };
}

/** Start voice recording */
function startRecording() {
  if (!state.recognition) return;
  state.recognition.lang = LANGS.find(l => l.code === curLang)?.voice || 'en-IN';
  try {
    state.recognition.start();
    state.isRecording = true;
    DOM.voiceBtn.classList.add('recording');
    DOM.vWave.classList.add('active');
  } catch (e) { console.warn('STT start error:', e.message); }
}

/** Stop voice recording */
function stopRecording() {
  if (!state.recognition) return;
  try { state.recognition.stop(); } catch (e) { /* Already stopped */ }
  state.isRecording = false;
  DOM.voiceBtn.classList.remove('recording');
  DOM.vWave.classList.remove('active');
}

/* ============================================================
   SECTION 14: EVENT HANDLERS
   ============================================================ */

/** AI toggle button */
DOM.aiTog.addEventListener('click', async () => {
  if (GEMINI.ready) {
    DOM.aiTog.classList.toggle('active');
    DOM.aiTog.setAttribute('aria-pressed', DOM.aiTog.classList.contains('active'));
    DOM.aiTog.title = DOM.aiTog.classList.contains('active') ? 'AI mode ON' : 'AI mode OFF';
  } else {
    const ok = await showApiKeyModal();
    if (ok) {
      DOM.aiTog.classList.add('active');
      DOM.aiTog.setAttribute('aria-pressed', 'true');
      DOM.aiTog.title = 'AI mode ON';
    }
  }
});

/** Voice input toggle */
DOM.voiceBtn.addEventListener('click', () => {
  state.isRecording ? stopRecording() : startRecording();
});

/** Voice output toggle */
DOM.voiceTog.addEventListener('click', () => {
  state.voiceOn = !state.voiceOn;
  DOM.voiceTog.classList.toggle('active', state.voiceOn);
  DOM.voiceTog.textContent = state.voiceOn ? '🔊' : '🔇';
  DOM.voiceTog.setAttribute('aria-pressed', state.voiceOn);
  if (!state.voiceOn && state.synth) state.synth.cancel();
});

/** Language change */
DOM.langBtn.addEventListener('click', () => {
  DOM.chatScreen.classList.remove('active');
  setTimeout(() => {
    DOM.langSel.classList.remove('exit');
    state.curProg = 0;
    DOM.chat.innerHTML = '';
    DOM.choices.innerHTML = '';
    updateProgress(0);
  }, 400);
});

/** Send message */
DOM.sendBtn.addEventListener('click', () => {
  const val = DOM.userInp.value.trim();
  if (val) { DOM.userInp.value = ''; handleQuery(val); }
});

/** Enter to send */
DOM.userInp.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    const val = DOM.userInp.value.trim();
    if (val) { DOM.userInp.value = ''; handleQuery(val); }
  }
});

/** Form submission prevention */
DOM.inputForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const val = DOM.userInp.value.trim();
  if (val) { DOM.userInp.value = ''; handleQuery(val); }
});

/** Show Indian tricolor confetti celebration */
function celebrate() {
  const container = DOM.cele;
  container.classList.add('on');
  
  const colors = ['#ff9933', '#FFFFFF', '#138808', '#d4a84b', '#f0d878', '#5b8def'];
  const frag = document.createDocumentFragment();
  
  for (let i = 0; i < 100; i++) {
    const confetti = document.createElement('div');
    confetti.className = 'conf';
    confetti.setAttribute('aria-hidden', 'true');
    confetti.style.cssText = `left:${Math.random()*100}%;background:${colors[i%6]};animation-delay:${Math.random()*2.5}s;animation-duration:${2.5+Math.random()*2.5}s;width:${4+Math.random()*7}px;height:${4+Math.random()*7}px;border-radius:${Math.random()>.5?'50%':'2px'}`;
    frag.appendChild(confetti);
  }
  
  container.appendChild(frag);
  
  const msg = document.createElement('div');
  msg.className = 'cele-m';
  msg.setAttribute('role', 'dialog');
  msg.setAttribute('aria-label', 'Journey Complete');
  
  const content = {
    en: '<h2>Jai Hind! 🇮🇳</h2><p>You\'re prepared for the world\'s largest democracy. Go vote!</p>',
    hi: '<h2>जय हिंद! 🇮🇳</h2><p>आप विश्व के सबसे बड़े लोकतंत्र के लिए तैयार हैं। वोट करें!</p>'
  };
  
  msg.innerHTML = (content[curLang] || content.en) +
    '<button onclick="this.closest(\'.cele-m\').remove();document.getElementById(\'cele\').classList.remove(\'on\')" autofocus>OK</button>';
  container.appendChild(msg);
  
  setTimeout(() => { container.classList.remove('on'); container.innerHTML = ''; }, 12000);
}
