<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="description"
    content="Navi — Interactive Indian Election Guide Agent. Nonpartisan, multilingual, voice-enabled assistant for Indian voters.">
  <meta name="theme-color" content="#050810">
  <meta http-equiv="X-Content-Security-Policy" content="upgrade-insecure-requests">
  <title>Navi — Indian Election Guide Agent</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400&family=Noto+Sans+Devanagari:wght@400;600;700&family=Noto+Sans+Tamil:wght@400;600&family=Noto+Sans+Kannada:wght@400;600&family=Noto+Sans+Telugu:wght@400;600&family=Noto+Sans+Bengali:wght@400;600&family=Noto+Sans+Gujarati:wght@400;600&family=Noto+Sans+Malayalam:wght@400;600&family=Noto+Sans+Gurmukhi:wght@400;600&family=Noto+Sans+Oriya:wght@400;600&display=swap"
    rel="stylesheet">

  <!-- Google Translate Element (loaded dynamically) -->
  <style>
    /* ============================================================
   NAVI — Indian Election Guide Agent
   Aesthetic: Dark cinematic with saffron-gold accents
   ============================================================ */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --bg: #050810;
      --bg2: #0a0e1a;
      --surface: #111827;
      --card: #161d2e;
      --card-h: #1e2740;
      --saffron: #ff9933;
      --saffron-l: #ffb366;
      --saffron-dim: rgba(255, 153, 51, .1);
      --gold: #d4a84b;
      --gold-l: #f0d878;
      --gold-dim: rgba(212, 168, 75, .08);
      --green: #138808;
      --green-l: #25c41b;
      --green-dim: rgba(19, 136, 8, .1);
      --white-accent: #e8e8e8;
      --blue: #5b8def;
      --blue-dim: rgba(91, 141, 239, .1);
      --text: #eef0f5;
      --text2: #8891a5;
      --text3: #3e4558;
      --border: rgba(255, 255, 255, .05);
      --border-s: rgba(255, 153, 51, .15);
      --fd: 'Syne', sans-serif;
      --fb: 'Source Serif 4', serif;
      --fm: 'DM Mono', monospace;
      --ease: cubic-bezier(.4, 0, .2, 1);
      --r: 14px;
      --r-sm: 10px
    }

    html {
      scroll-behavior: smooth
    }

    html,
    body {
      height: 100%;
      overflow: hidden
    }

    body {
      font-family: var(--fb);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 0%, rgba(40, 20, 5, .3) 0%, transparent 50%), radial-gradient(ellipse at 80% 100%, rgba(10, 30, 15, .2) 0%, transparent 50%), radial-gradient(ellipse at 50% 50%, rgba(10, 15, 30, .15) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0
    }

    /* Skip Navigation — Accessibility */
    .skip-link {
      position: absolute;
      top: -100px;
      left: 16px;
      z-index: 9999;
      padding: 12px 20px;
      background: var(--saffron);
      color: var(--bg);
      font-family: var(--fm);
      font-size: .8rem;
      border-radius: var(--r-sm);
      text-decoration: none;
      transition: top .3s
    }

    .skip-link:focus {
      top: 16px
    }

    #particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none
    }

    /* ===== LANGUAGE SELECTOR ===== */
    #langSel {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: all .9s var(--ease);
      overflow-y: auto
    }

    #langSel.exit {
      opacity: 0;
      transform: scale(1.1);
      pointer-events: none
    }

    .ls-orb {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp .7s .2s var(--ease) forwards
    }

    .ls-orb-c {
      position: absolute;
      inset: 24px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, var(--saffron-l), var(--saffron) 50%, #b35900);
      box-shadow: 0 0 40px rgba(255, 153, 51, .35), 0 0 80px rgba(255, 153, 51, .1);
      animation: breathe 4s ease-in-out infinite
    }

    .ls-orb-r {
      position: absolute;
      border-radius: 50%;
      border: 1.5px solid transparent
    }

    .ls-orb-r1 {
      inset: 4px;
      border-top-color: rgba(255, 153, 51, .35);
      animation: spin 10s linear infinite
    }

    .ls-orb-r2 {
      inset: 14px;
      border-bottom-color: rgba(212, 168, 75, .25);
      animation: spin 14s linear infinite reverse
    }

    @keyframes breathe {

      0%,
      100% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.08)
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .ls-title {
      font-family: var(--fd);
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      margin-bottom: 6px;
      opacity: 0;
      animation: fadeUp .7s .35s var(--ease) forwards
    }

    .ls-sub {
      color: var(--text2);
      font-size: .95rem;
      margin-bottom: 32px;
      font-weight: 300;
      opacity: 0;
      animation: fadeUp .7s .5s var(--ease) forwards;
      text-align: center
    }

    .ls-label {
      font-family: var(--fm);
      font-size: .65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--saffron);
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp .7s .6s var(--ease) forwards
    }

    .ls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      max-width: 740px;
      width: 100%;
      opacity: 0;
      animation: fadeUp .7s .7s var(--ease) forwards
    }

    .ls-card {
      padding: 14px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      cursor: pointer;
      text-align: center;
      transition: all .3s var(--ease);
      position: relative;
      overflow: hidden
    }

    .ls-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 153, 51, .05), transparent);
      opacity: 0;
      transition: opacity .3s
    }

    .ls-card:hover,
    .ls-card:focus {
      border-color: var(--border-s);
      transform: translateY(-3px);
      box-shadow: 0 6px 24px rgba(255, 153, 51, .08);
      outline: none
    }

    .ls-card:hover::before,
    .ls-card:focus::before {
      opacity: 1
    }

    .ls-card .native {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.4;
      display: block;
      margin-bottom: 2px
    }

    .ls-card .latin {
      font-family: var(--fm);
      font-size: .6rem;
      color: var(--text3);
      letter-spacing: .05em;
      text-transform: uppercase
    }

    /* Google Translate Bar */
    .gtranslate-bar {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 101;
      opacity: 0;
      animation: fadeUp .7s 1.2s var(--ease) forwards
    }

    .gtranslate-bar select {
      background: var(--surface);
      color: var(--text2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-family: var(--fm);
      font-size: .7rem;
      cursor: pointer
    }

    #google_translate_element {
      display: none
    }

    .ls-disclaimer {
      position: fixed;
      bottom: 20px;
      font-family: var(--fm);
      font-size: .55rem;
      color: var(--text3);
      letter-spacing: .06em;
      text-align: center;
      padding: 0 16px;
      opacity: 0;
      animation: fadeUp .7s 1s var(--ease) forwards
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* ===== CHAT SCREEN ===== */
    #chatScreen {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      grid-template-rows: auto auto 1fr auto auto;
      opacity: 0;
      transform: scale(.95);
      pointer-events: none;
      transition: all .8s var(--ease)
    }

    #chatScreen.active {
      opacity: 1;
      transform: scale(1);
      pointer-events: all
    }

    /* HEADER */
    .hdr {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: rgba(5, 8, 16, .88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      z-index: 10
    }

    .h-orb {
      position: relative;
      width: 38px;
      height: 38px;
      flex-shrink: 0
    }

    .h-orb-c {
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, var(--saffron-l), var(--saffron) 55%, #b35900);
      box-shadow: 0 0 14px rgba(255, 153, 51, .35);
      animation: breathe 3.5s ease-in-out infinite
    }

    .h-orb-r1 {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border-top: 1.5px solid rgba(255, 153, 51, .3);
      border-right: 1.5px solid rgba(255, 153, 51, .05);
      animation: spin 8s linear infinite
    }

    .h-orb-r2 {
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      border-bottom: 1.5px solid rgba(212, 168, 75, .2);
      border-left: 1.5px solid rgba(212, 168, 75, .03);
      animation: spin 12s linear infinite reverse
    }

    .h-orb.thinking .h-orb-c {
      animation-duration: 1s;
      box-shadow: 0 0 22px rgba(255, 153, 51, .6)
    }

    .h-info {
      flex: 1;
      min-width: 0
    }

    .h-name {
      font-family: var(--fd);
      font-size: .95rem;
      font-weight: 700
    }

    .h-status {
      font-family: var(--fm);
      font-size: .6rem;
      color: var(--text3);
      letter-spacing: .04em;
      transition: color .3s
    }

    .h-status.on {
      color: var(--saffron)
    }

    .h-ctrls {
      display: flex;
      align-items: center;
      gap: 6px
    }

    .h-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text3);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all .25s var(--ease);
      font-size: .8rem
    }

    .h-btn:hover,
    .h-btn:focus {
      border-color: var(--border-s);
      color: var(--saffron);
      background: var(--saffron-dim);
      outline: none
    }

    .h-btn.active {
      border-color: var(--saffron);
      color: var(--saffron);
      background: var(--saffron-dim)
    }

    .h-btn.lang-btn {
      font-size: .65rem;
      font-family: var(--fm);
      font-weight: 600;
      width: auto;
      padding: 0 10px;
      border-radius: 16px;
      letter-spacing: .03em
    }

    .h-ring {
      position: relative;
      width: 36px;
      height: 36px;
      flex-shrink: 0
    }

    .h-ring svg {
      width: 100%;
      height: 100%
    }

    .h-ring-bg {
      fill: none;
      stroke: rgba(255, 255, 255, .04);
      stroke-width: 3
    }

    .h-ring-f {
      fill: none;
      stroke: var(--saffron);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 94;
      stroke-dashoffset: 94;
      transition: stroke-dashoffset .8s var(--ease)
    }

    .h-ring-t {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--fm);
      font-size: .5rem;
      font-weight: 700;
      color: var(--saffron)
    }

    /* JOURNEY BAR */
    .j-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 10px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border)
    }

    .j-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--card);
      border: 1.5px solid rgba(255, 255, 255, .06);
      transition: all .5s var(--ease);
      position: relative
    }

    .j-dot.active {
      background: var(--saffron);
      border-color: var(--saffron);
      box-shadow: 0 0 8px rgba(255, 153, 51, .3)
    }

    .j-dot.done {
      background: var(--green-l);
      border-color: var(--green)
    }

    .j-dot::after {
      content: attr(data-l);
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--fm);
      font-size: .45rem;
      color: var(--text3);
      white-space: nowrap;
      opacity: 0;
      transition: opacity .3s
    }

    .j-dot.active::after,
    .j-dot:hover::after {
      opacity: 1
    }

    .j-line {
      width: 16px;
      height: 2px;
      background: rgba(255, 255, 255, .03);
      transition: background .5s var(--ease);
      border-radius: 1px
    }

    .j-line.done {
      background: var(--green)
    }

    /* CHAT */
    .chat {
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 0;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch
    }

    .chat::-webkit-scrollbar {
      width: 3px
    }

    .chat::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, .05);
      border-radius: 3px
    }

    .msg {
      display: flex;
      gap: 10px;
      margin-bottom: 4px;
      max-width: 600px;
      width: 100%;
      opacity: 0;
      transform: translateY(10px);
      animation: msgIn .3s var(--ease) forwards
    }

    .msg.agent {
      align-self: flex-start
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse
    }

    .msg-av {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .65rem;
      margin-top: 2px
    }

    .msg.agent .msg-av {
      background: var(--saffron-dim);
      border: 1px solid var(--border-s)
    }

    .msg.user .msg-av {
      background: var(--blue-dim);
      border: 1px solid rgba(91, 141, 239, .2)
    }

    .bub {
      padding: 12px 16px;
      font-size: .9rem;
      line-height: 1.65;
      border-radius: 16px;
      word-break: break-word
    }

    .msg.agent .bub {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px
    }

    .msg.agent .bub strong {
      color: var(--gold-l);
      font-weight: 600
    }

    .msg.user .bub {
      background: linear-gradient(135deg, var(--blue), #3d6ad4);
      color: #fff;
      border-bottom-right-radius: 4px
    }

    @keyframes msgIn {
      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* TYPING */
    .typ {
      display: flex;
      gap: 10px;
      margin-bottom: 4px;
      align-self: flex-start;
      opacity: 0;
      animation: msgIn .15s var(--ease) forwards
    }

    .typ .msg-av {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--saffron-dim);
      border: 1px solid var(--border-s);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .65rem;
      flex-shrink: 0
    }

    .typ-dots {
      display: flex;
      gap: 4px;
      padding: 13px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 4px
    }

    .typ-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text3);
      animation: tB 1.4s ease-in-out infinite
    }

    .typ-dot:nth-child(2) {
      animation-delay: .2s
    }

    .typ-dot:nth-child(3) {
      animation-delay: .4s
    }

    @keyframes tB {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: .3
      }

      30% {
        transform: translateY(-4px);
        opacity: 1
      }
    }

    /* VOICE WAVE */
    .voice-wave {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 8px 0
    }

    .voice-wave.active {
      display: flex
    }

    .vw-bar {
      width: 3px;
      background: var(--saffron);
      border-radius: 2px;
      animation: vwPulse 1s ease-in-out infinite
    }

    .vw-bar:nth-child(1) {
      height: 12px;
      animation-delay: 0s
    }

    .vw-bar:nth-child(2) {
      height: 18px;
      animation-delay: .15s
    }

    .vw-bar:nth-child(3) {
      height: 24px;
      animation-delay: .3s
    }

    .vw-bar:nth-child(4) {
      height: 18px;
      animation-delay: .45s
    }

    .vw-bar:nth-child(5) {
      height: 12px;
      animation-delay: .6s
    }

    @keyframes vwPulse {

      0%,
      100% {
        transform: scaleY(.4);
        opacity: .4
      }

      50% {
        transform: scaleY(1);
        opacity: 1
      }
    }

    /* CARDS */
    .rc {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border-s);
      border-radius: var(--r);
      margin: 6px 0;
      cursor: pointer;
      transition: all .25s var(--ease);
      text-decoration: none;
      color: inherit;
      max-width: 600px;
      opacity: 0;
      transform: translateY(10px);
      animation: msgIn .3s var(--ease) forwards
    }

    .rc:hover,
    .rc:focus {
      background: var(--card-h);
      border-color: var(--saffron);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(255, 153, 51, .06);
      outline: none
    }

    .rc-ico {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--saffron-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0
    }

    .rc-body {
      flex: 1;
      min-width: 0
    }

    .rc-body h4 {
      font-family: var(--fd);
      font-size: .85rem;
      font-weight: 600;
      margin-bottom: 1px
    }

    .rc-body p {
      font-size: .72rem;
      color: var(--text3);
      line-height: 1.3
    }

    .rc-tag {
      display: block;
      font-family: var(--fm);
      font-size: .5rem;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--saffron);
      margin-top: 5px;
      opacity: .6
    }

    .rc-arr {
      color: var(--saffron);
      font-size: .7rem;
      opacity: 0;
      transition: all .25s var(--ease);
      flex-shrink: 0
    }

    .rc:hover .rc-arr {
      opacity: 1;
      transform: translateX(3px)
    }

    .rc-links {
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border-s);
      border-radius: var(--r);
      margin: 6px 0;
      max-width: 600px;
      width: 100%;
      opacity: 0;
      transform: translateY(10px);
      animation: msgIn .3s var(--ease) forwards;
      display: flex;
      flex-direction: column;
      gap: 6px
    }

    .rc-links-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px
    }

    .rc-links-head h4 {
      font-family: var(--fd);
      font-size: .85rem;
      font-weight: 600
    }

    .rc-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--saffron);
      font-size: .82rem;
      text-decoration: none;
      transition: all .25s var(--ease)
    }

    .rc-link:hover,
    .rc-link:focus {
      border-color: var(--border-s);
      background: var(--card-h);
      outline: none
    }

    .rc-link span {
      margin-left: auto;
      opacity: .35;
      font-size: .6rem
    }

    /* YouTube Embed */
    .yt-embed {
      position: relative;
      width: 100%;
      max-width: 600px;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: var(--r);
      margin: 8px 0;
      border: 1px solid var(--border-s);
      opacity: 0;
      transform: translateY(10px);
      animation: msgIn .3s var(--ease) forwards
    }

    .yt-embed iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0
    }

    /* Google Maps Embed */
    .maps-embed {
      position: relative;
      width: 100%;
      max-width: 600px;
      height: 250px;
      border-radius: var(--r);
      margin: 8px 0;
      border: 1px solid var(--border-s);
      overflow: hidden;
      opacity: 0;
      transform: translateY(10px);
      animation: msgIn .3s var(--ease) forwards
    }

    .maps-embed iframe {
      width: 100%;
      height: 100%;
      border: 0
    }

    /* CHOICES */
    .choices {
      padding: 10px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 640px;
      margin: 0 auto;
      width: 100%
    }

    .ch {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: var(--fb);
      font-size: .9rem;
      cursor: pointer;
      text-align: left;
      transition: all .25s var(--ease);
      opacity: 0;
      transform: translateY(8px);
      animation: cIn .3s var(--ease) forwards;
      position: relative;
      overflow: hidden
    }

    .ch::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--saffron);
      transform: scaleY(0);
      transition: transform .25s var(--ease);
      border-radius: 0 2px 2px 0
    }

    .ch:hover,
    .ch:focus {
      background: var(--card-h);
      border-color: var(--border-s);
      transform: translateX(3px);
      outline: none
    }

    .ch:hover::before,
    .ch:focus::before {
      transform: scaleY(1)
    }

    .ch.sel {
      background: var(--saffron-dim);
      border-color: var(--saffron);
      color: var(--saffron-l)
    }

    .ch.sel::before {
      transform: scaleY(1)
    }

    .ch:disabled {
      opacity: .35;
      cursor: not-allowed;
      transform: none !important
    }

    @keyframes cIn {
      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* INPUT */
    .input-area {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(5, 8, 16, .9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border)
    }

    .inp {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--fb);
      font-size: .9rem;
      outline: none;
      transition: border-color .25s var(--ease)
    }

    .inp:focus {
      border-color: var(--border-s)
    }

    .inp::placeholder {
      color: var(--text3)
    }

    .send-btn,
    .voice-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all .25s var(--ease);
      flex-shrink: 0;
      font-size: .9rem
    }

    .send-btn {
      background: var(--saffron);
      color: var(--bg)
    }

    .send-btn:hover,
    .send-btn:focus {
      background: var(--saffron-l);
      transform: scale(1.05);
      outline: none
    }

    .voice-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text3)
    }

    .voice-btn:hover,
    .voice-btn:focus {
      border-color: var(--border-s);
      color: var(--saffron);
      outline: none
    }

    .voice-btn.recording {
      background: rgba(255, 50, 50, .15);
      border-color: rgba(255, 50, 50, .4);
      color: #ff5050;
      animation: recPulse 1.5s ease-in-out infinite
    }

    @keyframes recPulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(255, 50, 50, .2)
      }

      50% {
        box-shadow: 0 0 0 8px rgba(255, 50, 50, 0)
      }
    }

    /* QUICK ACTIONS */
    .qa {
      display: flex;
      gap: 6px;
      padding: 6px 16px 10px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch
    }

    .qa::-webkit-scrollbar {
      display: none
    }

    .qa-btn {
      flex-shrink: 0;
      padding: 6px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text2);
      font-family: var(--fm);
      font-size: .7rem;
      cursor: pointer;
      transition: all .25s var(--ease);
      white-space: nowrap
    }

    .qa-btn:hover,
    .qa-btn:focus {
      border-color: var(--border-s);
      color: var(--saffron);
      background: var(--saffron-dim);
      outline: none
    }

    /* CELEBRATION */
    #cele {
      position: fixed;
      inset: 0;
      z-index: 200;
      pointer-events: none;
      display: none
    }

    #cele.on {
      display: block
    }

    .conf {
      position: absolute;
      top: -10px;
      animation: cFall linear forwards
    }

    @keyframes cFall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0
      }
    }

    .cele-m {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: var(--card);
      border: 2px solid var(--saffron);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      z-index: 201;
      max-width: 380px;
      width: 90%;
      animation: celeP .5s .4s cubic-bezier(.17, .67, .35, 1.2) forwards
    }

    @keyframes celeP {
      to {
        transform: translate(-50%, -50%) scale(1)
      }
    }

    .cele-m h2 {
      font-family: var(--fd);
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 6px
    }

    .cele-m p {
      color: var(--text2);
      font-size: .88rem;
      margin-bottom: 20px;
      line-height: 1.6
    }

    .cele-m button {
      font-family: var(--fm);
      font-size: .72rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      background: var(--saffron);
      color: var(--bg);
      border: none;
      padding: 11px 24px;
      border-radius: 100px;
      cursor: pointer;
      transition: all .25s var(--ease)
    }

    .cele-m button:hover,
    .cele-m button:focus {
      background: var(--saffron-l);
      transform: translateY(-1px);
      outline: none
    }

    /* RESPONSIVE */
    @media(max-width:600px) {
      .hdr {
        padding: 10px 14px;
        gap: 10px
      }

      .chat {
        padding: 14px 12px
      }

      .choices {
        padding: 8px 12px 12px
      }

      .ch {
        padding: 10px 14px;
        font-size: .86rem
      }

      .bub {
        padding: 10px 14px;
        font-size: .86rem
      }

      .j-dot::after {
        display: none
      }

      .j-line {
        width: 10px
      }

      .ls-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px
      }

      .ls-card {
        padding: 10px 6px
      }

      .ls-card .native {
        font-size: .9rem
      }

      .ls-orb {
        width: 90px;
        height: 90px
      }

      .ls-orb-c {
        inset: 18px
      }

      .ls-orb-r1 {
        inset: 3px
      }

      .ls-orb-r2 {
        inset: 10px
      }

      .input-area {
        padding: 10px 12px
      }

      .inp {
        padding: 10px 14px;
        font-size: .86rem
      }

      .send-btn,
      .voice-btn {
        width: 38px;
        height: 38px;
        font-size: .8rem
      }

      .yt-embed,
      .maps-embed {
        max-width: 100%
      }
    }

    /* HIGH CONTRAST / REDUCED MOTION */
    @media(prefers-reduced-motion:reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important
      }
    }

    @media(prefers-contrast:high) {
      :root {
        --border: rgba(255, 255, 255, .2);
        --text2: #b0b8c8;
        --text3: #6a7080
      }
    }
  </style>

    /** Type text character by character with markdown support */
    async function typeText(container, text, speed = 14) {
      const html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
      let buf = '', i = 0;
      hOrb.classList.add('thinking'); setSt(t('speak'), true);
      while (i < html.length) {
        if (html[i] === '<') { const e = html.indexOf('>', i); buf += html.substring(i, e + 1); i = e + 1 }
        else { buf += html[i]; i++; container.innerHTML = buf; scroll(); await sleep(speed + Math.random() * 6) }
      }
      container.innerHTML = html;
      hOrb.classList.remove('thinking'); setSt(t('ready'), false);
      if (voiceOn) speakText(text);
    }

    const GEMINI = {

      endpoint: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent',

      /** API key — stored in sessionStorage for security (user provides once) */
      get apiKey() { return sessionStorage.getItem('navi_gemini_key') || ''; },

Rules:

    };

    /**
     * Prompt user for Gemini API key (one-time per session)
     * @returns {boolean} Whether key was provided
     */
    function promptApiKey() {
      if (GEMINI.isAvailable) return true;

      const key = prompt(
        'To enable AI-powered answers, enter your Google Gemini API key.\n\n' +
        'Get a free key at: https://aistudio.google.com/apikey\n\n' +
        '(Skip to use the standard guide without AI)'
      );

      if (key && key.trim().length > 10) {
        GEMINI.apiKey = key.trim();
        return true;
      }
      return false;
    }

    /**
     * Query Google Gemini AI for election-related questions
     * Falls back gracefully if API is unavailable
     * 
     * @param {string} query - User's question
     * @param {string} lang - Current language code
     * @returns {Promise<string|null>} AI response or null on failure
     */
    async function queryGemini(query, lang) {
      if (!GEMINI.isAvailable && !promptApiKey()) return null;

      try {
        const langName = LANGS.find(l => l.code === lang)?.latin || 'English';

        const response = await fetch(`${GEMINI.endpoint}?key=${GEMINI.apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            systemInstruction: {
              parts: [{ text: GEMINI.systemPrompt + `\n\nRespond in ${langName} language.` }]
            },
            contents: [{
              parts: [{ text: query }]
            }],
            generationConfig: {
              maxOutputTokens: GEMINI.maxTokens,
              temperature: GEMINI.temperature
            }
          })
        });

        if (!response.ok) {
          console.warn('Gemini API error:', response.status);
          return null;
        }

        const data = await response.json();
        const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;

        return text || null;
      } catch (e) {
        console.warn('Gemini query failed:', e.message);
        return null;
      }
    }

    /**
     * Process user free-text query with three-tier resolution:

     * 2. Gemini AI fallback (intelligent, requires API key)
     * 3. Static fallback (always available)
     * 
     * @param {string} raw - User input text
     */
    async function handleQuery(raw) {
      const q = raw.toLowerCase().trim();

      // Sanitize input — prevent XSS
      const sanitized = q.replace(/[<>]/g, '');
      if (sanitized.length === 0) return;

      // TIER 1: Local keyword matching (instant)
      const map = QMAP[curLang] || {};
      const enMap = QMAP.en || {};

      for (const [kw, node] of Object.entries(map)) {
        if (sanitized.includes(kw)) { navigateTo(node, raw); return; }
      }
      for (const [kw, node] of Object.entries(enMap)) {
        if (sanitized.includes(kw)) { navigateTo(node, raw); return; }
      }

      // TIER 2: Gemini AI (if available)
      const aiResponse = await queryGemini(raw, curLang);
      if (aiResponse) {
        addAIResponse(raw, aiResponse);
        return;
      }

      // TIER 3: Static fallback
      addAgentFallback(raw);
    }

        ta: "புரியவில்லை. பதிவு, வாக்காளர் ID, வாக்காளர் பட்டியல், EVM, NOTA பற்றி கேளுங்கள்.\n\n💡 AI பயன்முறையை இயக்கவும் (✦ பொத்தான்).",
        te: "అర్థం కాలేదు. నమోదు, ఓటర్ ID, ఓటరు జాబಿತా, EVM, NOTA గురించి అడగండి.\n\n💡 AI మోడ్ ప్రారంభించండి (✦ బటన్).",
        ml: "മനസ്സിലായില്ല. രജിസ്ട്രേഷൻ, വോട്ടർ ID, EVM, NOTA എന്നിവയെക്കുറിച്ച് ചോദിക്കൂ.\n\n💡 AI മോഡ് പ്രവർത്തനക്ഷമമാക്കുക (✦ ബട്ടൺ)."
      };

      await addMsg(fallbacks[curLang] || fallbacks.en);
      addChoices(getChoices(C.welcome));
      addQuickActions();
    }

    /* ============================================================
       SECTION 12: EVENT LISTENERS (UPGRADED)
       ============================================================ */

    // Add AI toggle button to header
    (function () {
      const aiBtn = document.createElement('button');
      aiBtn.className = 'h-btn';
      aiBtn.id = 'aiTog';
      aiBtn.title = 'Toggle AI mode (Gemini)';
      aiBtn.setAttribute('aria-label', 'Toggle AI mode');
      aiBtn.textContent = '✦';
      aiBtn.style.cssText = 'font-size:.9rem';
      aiBtn.addEventListener('click', () => {
        if (GEMINI.isAvailable) {
          // Toggle AI indicator
          aiBtn.classList.toggle('active');
          aiBtn.title = aiBtn.classList.contains('active') ? 'AI mode ON' : 'AI mode OFF';
        } else {
          promptApiKey();
          if (GEMINI.isAvailable) aiBtn.classList.add('active');
        }
      });
      // Insert before language button
      const ctrls = document.querySelector('.h-ctrls');
      if (ctrls) ctrls.insertBefore(aiBtn, ctrls.firstChild);
    })();

    voiceBtn.addEventListener('click', () => { isRecording ? stopRecording() : startRecording(); });
    voiceTog.addEventListener('click', () => {
      voiceOn = !voiceOn;
      voiceTog.classList.toggle('active', voiceOn);
      voiceTog.textContent = voiceOn ? '🔊' : '🔇';
      voiceTog.setAttribute('aria-pressed', voiceOn);
      if (!voiceOn && synth) synth.cancel();
    });
    langBtn.addEventListener('click', () => {
      document.getElementById('chatScreen').classList.remove('active');
      setTimeout(() => {
        document.getElementById('langSel').classList.remove('exit');
        curProg = 0;
        chatEl.innerHTML = '';
        choicesEl.innerHTML = '';
        updProg(0);
      }, 400);
    });
    sendBtn.addEventListener('click', () => {
      const v = userInp.value.trim();
      if (v) { userInp.value = ''; handleQuery(v); }
    });
    userInp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const v = userInp.value.trim();
        if (v) { userInp.value = ''; handleQuery(v); }
      }
    });

    /* ============================================================
       SECTION 13: CELEBRATION (UNCHANGED)
       ============================================================ */

    function celebrate() {
      const c = document.getElementById('cele');
      c.classList.add('on');
      const colors = ['#ff9933', '#FFFFFF', '#138808', '#d4a84b', '#f0d878', '#5b8def'];
      for (let i = 0; i < 100; i++) {
        const d = document.createElement('div');
        d.className = 'conf';
        d.setAttribute('aria-hidden', 'true');
        d.style.cssText = `left:${Math.random() * 100}%;background:${colors[i % 6]};animation-delay:${Math.random() * 2.5}s;animation-duration:${2.5 + Math.random() * 2.5}s;width:${4 + Math.random() * 7}px;height:${4 + Math.random() * 7}px;border-radius:${Math.random() > .5 ? '50%' : '2px'}`;
        c.appendChild(d);
      }
      const m = document.createElement('div');
      m.className = 'cele-m';
      m.setAttribute('role', 'dialog');
      m.setAttribute('aria-label', 'Journey Complete');
      const ct = {
        en: '<h2>Jai Hind! 🇮🇳</h2><p>You\'re prepared for the world\'s largest democracy. Go vote!</p>',
        hi: '<h2>जय हिंद! 🇮🇳</h2><p>आप विश्व के सबसे बड़े लोकतंत्र के लिए तैयार हैं। वोट करें!</p>'
      };
      m.innerHTML = (ct[curLang] || ct.en) + '<button onclick="this.closest(\'.cele-m\').remove();document.getElementById(\'cele\').classList.remove(\'on\')" autofocus>OK</button>';
      c.appendChild(m);
      setTimeout(() => { c.classList.remove('on'); c.innerHTML = ''; }, 12000);
    }

    /* ============================================================
       SECTION 14: INITIALIZATION
       ============================================================ */

    initSTT();
    if (synth) synth.onvoiceschanged = () => { };

    // Load Google Translate script asynchronously
    (function () {
      const s = document.createElement('script');
      s.src = '//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
      s.async = true;
      s.defer = true;
      s.onerror = () => { /* Google Translate unavailable — graceful fallback */ };
      document.head.appendChild(s);
    })();

    // Log initialization
    console.log('%c🗳️ Navi — Indian Election Guide Agent v2.1', 'color:#ff9933;font-size:14px;font-weight:bold');
    console.log('%c13 languages · Voice I/O · Gemini AI · 7 Google Services', 'color:#8891a5;font-size:11px');
  </script>
</body>

</html>
